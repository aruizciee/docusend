<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f8ff"/>
    </linearGradient>
    <linearGradient id="arrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#002244" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Documento -->
  <path d="M40 15 h35 l20 20 v60 h-55 z"
        fill="url(#docGrad)" stroke="#004080" stroke-width="3" stroke-linejoin="round"/>

  <!-- Pliegue esquina -->
  <path d="M75 15 v20 h20"
        fill="#d9ebff" stroke="#004080" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Lineas decorativas -->
  <path d="M50 45 h30 M50 60 h30 M50 75 h15"
        fill="none" stroke="#b3d4ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Flecha -->
  <path d="M 10 85 Q 46 116, 86 76 L 90 96 L 110 40 L 54 60 L 74 64 Q 38 100, 10 85 Z"
        fill="url(#arrGrad)" stroke="#ffffff" stroke-width="3"
        stroke-linejoin="round" filter="url(#shadow)"/>
</svg>
