name: Build y Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Convertir SVG a ICO
        run: |
          pip install svglib reportlab pillow
          $script = @'
          from svglib.svglib import svg2rlg
          from reportlab.graphics import renderPM
          from PIL import Image
          import io

          sizes = [16, 32, 48, 64, 128, 256]
          imgs = []
          for s in sizes:
              drawing = svg2rlg("assets/icon.svg")
              scale = s / max(drawing.width, drawing.height)
              drawing.width = s
              drawing.height = s
              drawing.transform = f"scale({scale},{scale})"
              png = renderPM.drawToString(drawing, fmt="PNG")
              imgs.append(Image.open(io.BytesIO(png)).convert("RGBA"))
          imgs[0].save("assets/icon.ico", format="ICO",
                       sizes=[(s, s) for s in sizes], append_images=imgs[1:])
          print("ICO generado correctamente")
          '@
          $script | Out-File -FilePath svg_to_ico.py -Encoding utf8
          python svg_to_ico.py

      - name: Generar tag de version
        id: version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $run  = "${{ github.run_number }}"
          $tag  = "v$date-$run"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          [System.IO.File]::WriteAllText("version.py", "VERSION = `"$tag`"`n", [System.Text.UTF8Encoding]::new($false))

      - name: Compilar ejecutable
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --collect-all customtkinter `
            --runtime-tmpdir "%TEMP%" `
            --icon assets/icon.ico `
            docusend.py

      - name: Crear Release y subir .exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Release ${{ steps.version.outputs.TAG }}"
          body: |
            Release automatica generada al hacer push a `main`.

            **Commit:** ${{ github.sha }}
            **Mensaje:** ${{ github.event.head_commit.message }}
          files: dist/docusend.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
